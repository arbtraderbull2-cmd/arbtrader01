<!-- ── SCREEN 2: EXECUTE ── -->
<div class="page" id="pg-execute">

  <div class="exec-section-title">
    Order
    <span class="exec-acc-name" id="exec-active-acc-name">No account selected</span>
  </div>

  <!-- No account selected state -->
  <div class="exec-placeholder" id="exec-placeholder">
    <div class="exec-placeholder-icon">⬅</div>
    <div>Login or select an account in the sidebar to place an order</div>
  </div>

  <!-- Order form (shown once account activated) -->
  <div id="exec-order-form" style="display:none">

    <div class="order-row">
      <div class="order-field">
        <label>Symbol</label>
        <select id="ord-symbol" onchange="onSymbolChange()">
          <option value="">Loading symbols…</option>
        </select>
      </div>
      <div class="order-field">
        <label>Order type</label>
        <select id="ord-type" onchange="onOrderTypeChange()">
          <option value="market">Market</option>
          <option value="limit">Limit</option>
          <option value="stop">Stop</option>
          <option value="stop_limit">Stop Limit</option>
        </select>
      </div>
    </div>

    <!-- Live bid/ask bar -->
    <div class="live-quote-bar" id="live-quote-bar">
      <div class="lq-side">
        <div class="lq-lbl">Bid</div>
        <div class="lq-val bid" id="ord-bid">—</div>
      </div>
      <div class="lq-spread" id="ord-spread">—</div>
      <div class="lq-side" style="text-align:right">
        <div class="lq-lbl">Ask</div>
        <div class="lq-val ask" id="ord-ask">—</div>
      </div>
      <div class="lq-pulse" id="lq-pulse"></div>
    </div>

    <!-- Price fields (limit/stop only) -->
    <div class="order-row" id="ord-price-row" style="display:none">
      <div class="order-field">
        <label id="ord-price-lbl">Price</label>
        <input type="number" id="ord-price" step="0.01" placeholder="0.00" />
      </div>
      <div class="order-field" id="ord-stoplimit-wrap" style="display:none">
        <label>Stop limit price</label>
        <input type="number" id="ord-stoplimit" step="0.01" placeholder="0.00" />
      </div>
    </div>

    <!-- Lot size -->
    <div class="order-row">
      <div class="order-field">
        <label>Volume (lots)</label>
        <div class="lot-presets">
          <button class="lot-preset active" onclick="setLot(this,'1')">1</button>
          <button class="lot-preset"        onclick="setLot(this,'3.1')">3.1</button>
          <button class="lot-preset"        onclick="setLot(this,'20')">20</button>
          <button class="lot-preset"        onclick="setLot(this,'')">Custom</button>
        </div>
        <input type="number" id="ord-lots" value="1" step="0.01" min="0.01" />
      </div>
      <div class="order-field">
        <label>Deviation (pts)</label>
        <input type="number" id="ord-deviation" value="10" min="0" />
      </div>
    </div>

    <!-- SL / TP -->
    <div class="order-row">
      <div class="order-field">
        <label>Stop Loss <span class="acc-optional">(0 = none)</span></label>
        <input type="number" id="ord-sl" value="0" step="0.01" />
      </div>
      <div class="order-field">
        <label>Take Profit <span class="acc-optional">(0 = none)</span></label>
        <input type="number" id="ord-tp" value="0" step="0.01" />
      </div>
    </div>

    <!-- Comment -->
    <div class="order-row">
      <div class="order-field" style="grid-column:span 2">
        <label>Comment <span class="acc-optional">(optional)</span></label>
        <input type="text" id="ord-comment" placeholder="ArbTrader" maxlength="32" />
      </div>
    </div>

    <div class="ord-status" id="ord-status"></div>

    <!-- BUY / SELL -->
    <div class="ord-execute-row">
      <button class="ord-btn ord-buy"  onclick="placeOrder('buy')">
        <span class="ord-btn-type">BUY</span>
        <span class="ord-btn-price" id="ord-buy-price">—</span>
      </button>
      <button class="ord-btn ord-sell" onclick="placeOrder('sell')">
        <span class="ord-btn-type">SELL</span>
        <span class="ord-btn-price" id="ord-sell-price">—</span>
      </button>
    </div>

  </div><!-- /#exec-order-form -->

</div><!-- /#pg-execute -->
